kind = "web"
previewPath = "/"
title = "LoadBoard Pro"
version = "1.0.0"
id = "artifacts/loadboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19266

[services.development]
run = "pnpm --filter @workspace/loadboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loadboard", "run", "build" ]
publicDir = "artifacts/loadboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19266"
BASE_PATH = "/"
